name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  UV_FROZEN: "1"

jobs:
  backend:
    name: Backend quality
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Python and uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint
        run: uv run ruff check .

      - name: Run backend tests
        run: uv run pytest -m "not mysql"

  frontend:
    name: Frontend quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.22.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Build production frontend
        run: npm run build

  mysql-integration:
    name: MySQL integration
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: sole_syntax_test
          MYSQL_USER: sole_syntax
          MYSQL_PASSWORD: sole_syntax
          MYSQL_ROOT_PASSWORD: local_root_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -plocal_root_password --silent"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      TEST_DATABASE_URL: mysql+pymysql://sole_syntax:sole_syntax@127.0.0.1:3306/sole_syntax_test?charset=utf8mb4
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Python and uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run migration and concurrency tests
        run: uv run pytest -m mysql

  containers:
    name: Container builds
    runs-on: ubuntu-latest
    needs: [backend, frontend, mysql-integration]
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Validate Compose configuration
        run: docker compose config --quiet

      - name: Build production images
        run: docker compose build api web
